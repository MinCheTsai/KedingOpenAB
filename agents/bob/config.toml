[discord]
bot_token = "${DISCORD_BOT_TOKEN}"
allowed_channels = ["${CHANNEL_KRUSTY_KRAB}", "${CHANNEL_LAB}", "${CHANNEL_PLAZA}", "${CHANNEL_TV}"]
allow_bot_messages = "mentions"
allow_user_messages = "multibot-mentions"
max_bot_turns = 100

[agent]
command = "kiro-cli"
args = ["acp", "--trust-all-tools"]
working_dir = "/home/agent/projects"
env = { KIRO_API_KEY = "${KIRO_API_KEY}" }
inherit_env = ["GH_TOKEN", "GIT_AUTHOR_NAME", "GIT_COMMITTER_NAME", "GIT_AUTHOR_EMAIL", "GIT_COMMITTER_EMAIL", "AWS_ACCESS_KEY_ID", "AWS_SECRET_ACCESS_KEY", "KIRO_API_KEY", "DISCORD_BOT_TOKEN", "CHANNEL_TV"]

[pool]
max_sessions = 10
session_ttl_hours = 24

[reactions]
enabled = true
remove_after_reply = false

[reactions.emojis]
queued = "👀"
thinking = "🤔"
tool = "🔥"
coding = "🧽"
web = "⚡"
done = "🆗"
error = "😱"

[reactions.timing]
debounce_ms = 700
stall_soft_ms = 10000
stall_hard_ms = 30000
done_hold_ms = 1500
error_hold_ms = 2500

[cron]
usercron_enabled = true
usercron_path = "cronjob.toml"
