# 🏝️ 比奇堡開發團隊
# 啟動: docker compose up -d --build
# 停止: docker compose down
# 看 logs: docker compose logs -f bob
# 更新 OpenAB: docker compose build --pull && docker compose up -d

# ─── 共用設定 ──────────────────────────────────────────
x-extra-hosts: &extra-hosts
  extra_hosts:
    - "host.docker.internal:host-gateway"

services:
  # ─── AI 角色 ─────────────────────────────────────────
  bob:
    build: .
    container_name: bob
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_BOB}
      - KIRO_API_KEY=${KIRO_API_KEY_BOB}
      - GIT_AUTHOR_NAME=海綿寶寶 (SpongeBob)
      - GIT_COMMITTER_NAME=海綿寶寶 (SpongeBob)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
      - RUST_LOG=openab=debug
      - AGENT_NAME=bob
      - AGENT_SKILLS=xlsx,pdf,pptx,docx,doc-coauthoring
    volumes:
      - ./agents/bob/config.toml:/etc/openab/config.toml:ro
      - ./agents/bob:/home/agent
      - nas:/nas
      - ./shared/steering:/opt/steering:ro
      - ./shared/skills:/opt/skills:ro

  patrick:
    build: .
    container_name: patrick
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_PATRICK}
      - KIRO_API_KEY=${KIRO_API_KEY_PATRICK}
      - GIT_AUTHOR_NAME=派大星 (Patrick)
      - GIT_COMMITTER_NAME=派大星 (Patrick)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
      - AGENT_NAME=patrick
      - AGENT_SKILLS=xlsx,pdf,pptx,docx,doc-coauthoring
    volumes:
      - ./agents/patrick/config.toml:/etc/openab/config.toml:ro
      - ./agents/patrick:/home/agent
      - nas:/nas
      - ./shared/steering:/opt/steering:ro
      - ./shared/skills:/opt/skills:ro

  puff:
    build: .
    container_name: puff
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_PUFF}
      - KIRO_API_KEY=${KIRO_API_KEY_PUFF}
      - GIT_AUTHOR_NAME=泡芙老師 (Mrs. Puff)
      - GIT_COMMITTER_NAME=泡芙老師 (Mrs. Puff)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
      - AGENT_NAME=puff
      - AGENT_SKILLS=xlsx,pdf,pptx,docx,doc-coauthoring
    volumes:
      - ./agents/puff/config.toml:/etc/openab/config.toml:ro
      - ./agents/puff:/home/agent
      - nas:/nas
      - ./shared/steering:/opt/steering:ro
      - ./shared/skills:/opt/skills:ro

  squidward:
    build: .
    container_name: squidward
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_SQUIDWARD}
      - KIRO_API_KEY=${KIRO_API_KEY_SQUIDWARD}
      - GIT_AUTHOR_NAME=章魚哥 (Squidward)
      - GIT_COMMITTER_NAME=章魚哥 (Squidward)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
      - AGENT_NAME=squidward
      - AGENT_SKILLS=xlsx,pdf,pptx,docx,doc-coauthoring
    volumes:
      - ./agents/squidward/config.toml:/etc/openab/config.toml:ro
      - ./agents/squidward:/home/agent
      - nas:/nas
      - ./shared/steering:/opt/steering:ro
      - ./shared/skills:/opt/skills:ro

  sandy:
    build: .
    container_name: sandy
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_SANDY}
      - KIRO_API_KEY=${KIRO_API_KEY_SANDY}
      - GIT_AUTHOR_NAME=珊迪 (Sandy)
      - GIT_COMMITTER_NAME=珊迪 (Sandy)
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
      - RUST_LOG=openab=debug
      - AGENT_NAME=sandy
      - AGENT_SKILLS=xlsx,pdf,pptx,docx,doc-coauthoring
    volumes:
      - ./agents/sandy/config.toml:/etc/openab/config.toml:ro
      - ./agents/sandy:/home/agent
      - nas:/nas
      - ./shared/steering:/opt/steering:ro
      - ./shared/skills:/opt/skills:ro

  # ─── WeCom Bot（透過 Gateway 連接企業微信）─────────────
  wecom-bot:
    build: .
    container_name: wecom-bot
    restart: unless-stopped
    <<: *extra-hosts
    env_file: .env
    environment:
      - KIRO_API_KEY=${KIRO_API_KEY_WECOM_BOT}
      - GIT_AUTHOR_NAME=WeCom Bot
      - GIT_COMMITTER_NAME=WeCom Bot
      - GIT_AUTHOR_EMAIL=${GIT_EMAIL}
      - GIT_COMMITTER_EMAIL=${GIT_EMAIL}
    volumes:
      - ./agents/wecom-bot/config.toml:/etc/openab/config.toml:ro
      - ./agents/wecom-bot:/home/agent
    depends_on:
      - gateway

  # ─── OpenAB Gateway（WeCom webhook 接收器）──────────
  gateway:
    image: ghcr.io/openabdev/openab-gateway:latest
    container_name: gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env

  # ─── 獨立服務 ───────────────────────────────────────
  magic-conch:
    build: ./services/magic-conch
    container_name: magic-conch
    restart: always
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_CONCH}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - CONCH_CHANNEL_ID=1505752303624392755
      - CONCH_ADMIN_IDS=${CONCH_ADMIN_IDS}
      - CONCH_OPERATOR_ROLE_IDS=${CONCH_OPERATOR_ROLE_IDS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  slash-bot:
    build: ./services/slash-bot
    container_name: slash-bot
    restart: unless-stopped
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN_GARY}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - SLASH_BOT_CHANNEL_ID=${SLASH_BOT_CHANNEL_ID}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=us-east-1

# ─── NAS CIFS Volume（單一連線，掛載 88.BikiniBottom 根目錄）───
volumes:
  nas:
    driver: local
    driver_opts:
      type: cifs
      o: "addr=192.168.1.218,username=${NAS_USER},password=${NAS_PASSWORD},file_mode=0777,dir_mode=0777,vers=3.0,iocharset=utf8"
      device: "//192.168.1.218/KD共用/18_各部門共享區/21_系統開發課/88.BikiniBottom"
